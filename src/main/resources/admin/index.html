<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jmagnifier 管理台</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">JM</div>
        <div>
          <div class="brand-title">jmagnifier</div>
          <div class="brand-subtitle">协议抓取与转发</div>
        </div>
      </div>
      <nav class="nav">
        <a href="/" data-nav="/">运行状态</a>
        <a href="/mappings" data-nav="/mappings">映射配置</a>
        <a href="/connections" data-nav="/connections">连接记录</a>
        <a href="/packets" data-nav="/packets">报文记录</a>
      </nav>
      <button id="logout-button" class="secondary-button" type="button">退出登录</button>
    </aside>
    <main class="main">
      <div id="view"></div>
    </main>
  </div>
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="icon-button" type="button" aria-label="关闭">x</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
