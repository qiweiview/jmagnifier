<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jmagnifier 登录</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="login-page">
  <div class="shell-bg" aria-hidden="true">
    <div class="bg-orb bg-orb-primary"></div>
    <div class="bg-orb bg-orb-secondary"></div>
    <div class="bg-grid"></div>
  </div>
  <main class="login-shell">
    <section class="login-hero">
      <div class="login-hero-card">
        <div class="brand-mark">JM</div>
        <h1>jmagnifier 管理台</h1>
        <p class="login-copy">用于查看运行状态、维护映射配置，并排查连接和报文问题。</p>
        <div class="hero-points">
          <span>运行巡检</span>
          <span>映射维护</span>
          <span>连接排障</span>
        </div>
      </div>
    </section>
    <section class="login-panel">
      <h2>登录管理台</h2>
      <p class="login-copy">输入管理密码后可查看运行状态、修改映射并排查连接与报文。</p>
      <div class="login-notes">
        <span>仅管理员可访问</span>
        <span>登录失败时请检查当前服务端配置的管理密码</span>
      </div>
      <form id="login-form" class="login-form">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
        <button id="login-submit" type="submit">进入控制台</button>
        <p id="login-message" class="form-message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="/assets/login.js"></script>
</body>
</html>
