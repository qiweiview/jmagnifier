admin:
  host: "127.0.0.1"
  port: 8080
  password: "admin"
  sessionTimeoutMinutes: 720

store:
  sqlitePath: "./data/jmagnifier.db"
  spillDir: "./data/spill"

capture:
  enabled: true
  maxCaptureBytes: 4096
  queueCapacity: 10000
  batchSize: 100
  flushIntervalMillis: 200

mappings:
  - name: 'r1'
    enable: true
    listenPort: 9300 # 监听端口
    forwardHost: "qw607.com" # 转发目标域名
    forwardPort: 80 # 转发目标端口
    console:
      printRequest: false # 是否打印转发信息
      printResponse: false # 是否打印转发信息
    dump:
      enable: true # 是否开启转发数据包dump
      dumpPath: "D:\\JAVA_WORK_SPACE\\jmagnifier\\target" # dump数据包存放路径
